apiVersion: apps/v1
kind: Deployment
metadata:
  name: DEPLOYMENT_NAME
  namespace: NAMESPACE
  labels:
    app: PROJECT
spec:
  selector:
    matchLabels:
      project: PROJECT
  template:
    metadata:
      namespace: NAMESPACE
      labels:
        project: PROJECT
    spec:
      containers:
         - name: PROJECT
           image: REGISTRY_HOSTNAME/PROJECT:TAG_VERSION
           securityContext:
             allowPrivilegeEscalation: false
             runAsNonRoot: true      # опционально, но хорошая практика
             runAsUser: 1000         # опционально
           ports:
             - containerPort: PORT_CONTAINER
           env:
             - name: FILES_SERVICE_URL
               valueFrom:
                 secretKeyRef:
                   name: main-gateway-service-14-04-2026-production-config-secret
                   key: FILES_SERVICE_URL
             - name: INCLUDE_TESTING_MODULE
               valueFrom:
                 secretKeyRef:
                   name: main-gateway-service-14-04-2026-production-config-secret
                   key: INCLUDE_TESTING_MODULE
             - name: PRISMA_DB_URL
               valueFrom:
                 secretKeyRef:
                   name: main-gateway-service-14-04-2026-production-config-secret
                   key: PRISMA_DB_URL
             - name: FRONTEND_URL
               valueFrom:
                 secretKeyRef:
                   name: main-gateway-service-14-04-2026-production-config-secret
                   key: FRONTEND_URL
             - name: JWT_SECRET
               valueFrom:
                 secretKeyRef:
                   name: main-gateway-service-14-04-2026-production-config-secret
                   key: JWT_SECRET
             - name: ACCESS_TOKEN_EXPIRE_TIME
               valueFrom:
                 secretKeyRef:
                   name: main-gateway-service-14-04-2026-production-config-secret
                   key: ACCESS_TOKEN_EXPIRE_TIME
             - name: REFRESH_TOKEN_EXPIRE_TIME
               valueFrom:
                 secretKeyRef:
                   name: main-gateway-service-14-04-2026-production-config-secret
                   key: REFRESH_TOKEN_EXPIRE_TIME
             - name: RABBITMQ_URL
               valueFrom:
                 secretKeyRef:
                   name: main-gateway-service-14-04-2026-production-config-secret
                   key: RABBITMQ_URL
             - name: NOTIFICATION_QUEUE_NAME
               valueFrom:
                 secretKeyRef:
                   name: main-gateway-service-14-04-2026-production-config-secret
                   key: NOTIFICATION_QUEUE_NAME
             - name: GOOGLE_CLIENT_ID
               valueFrom:
                 secretKeyRef:
                   name: main-gateway-service-14-04-2026-production-config-secret
                   key: GOOGLE_CLIENT_ID
             - name: GOOGLE_CLIENT_SECRET
               valueFrom:
                 secretKeyRef:
                   name: main-gateway-service-14-04-2026-production-config-secret
                   key: GOOGLE_CLIENT_SECRET
             - name: GOOGLE_REDIRECT_URI
               valueFrom:
                 secretKeyRef:
                   name: main-gateway-service-14-04-2026-production-config-secret
                   key: GOOGLE_REDIRECT_URI
             - name: RECAPTCHA_SECRET
               valueFrom:
                 secretKeyRef:
                   name: main-gateway-service-14-04-2026-production-config-secret
                   key: RECAPTCHA_SECRET
             - name: PORT
               valueFrom:
                 secretKeyRef:
                   name: main-gateway-service-14-04-2026-production-config-secret
                   key: PORT
