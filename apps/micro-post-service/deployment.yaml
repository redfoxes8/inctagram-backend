apiVersion: apps/v1
kind: Deployment
metadata:
  name: DEPLOYMENT_NAME
  namespace: NAMESPACE
  labels:
    app: PROJECT
spec:
  selector:
    matchLabels:
      project: PROJECT
  template:
    metadata:
      namespace: NAMESPACE
      labels:
        project: PROJECT
    spec:
      containers:
         - name: PROJECT
           image: REGISTRY_HOSTNAME/PROJECT:TAG_VERSION
           securityContext:
             allowPrivilegeEscalation: false
             runAsNonRoot: true      # опционально, но хорошая практика
             runAsUser: 1000         # опционально
           ports:
             - containerPort: PORT_CONTAINER
           env:
             - name: GRPC_HOST
               valueFrom:
                 secretKeyRef:
                   name: micro-post-service-31-05-2026-production-config-secret
                   key: GRPC_HOST
             - name: GRPC_PORT
               valueFrom:
                 secretKeyRef:
                   name: micro-post-service-31-05-2026-production-config-secret
                   key: GRPC_PORT
             - name: FILE_SERVICE_GRPC_URL
               valueFrom:
                 secretKeyRef:
                   name: micro-post-service-31-05-2026-production-config-secret
                   key: FILE_SERVICE_GRPC_URL
             - name: RABBITMQ_URL
               valueFrom:
                 secretKeyRef:
                   name: micro-post-service-31-05-2026-production-config-secret
                   key: RABBITMQ_URL
             - name: DATABASE_URL
               valueFrom:
                 secretKeyRef:
                   name: micro-post-service-31-05-2026-production-config-secret
                   key: DATABASE_URL
             - name: PORT
               valueFrom:
                 secretKeyRef:
                   name: micro-post-service-31-05-2026-production-config-secret
                   key: PORT
